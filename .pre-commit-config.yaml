repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: just lint
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format check
        entry: just format-check
        language: system
        pass_filenames: false
      - id: ty-typecheck
        name: ty typecheck
        entry: just typecheck
        language: system
        pass_filenames: false
