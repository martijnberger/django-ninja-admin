name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: OpenAPI contract / Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Check OpenAPI snapshot
        run: just openapi-snapshot-check

  dist:
    name: Distribution / Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Build and check distribution
        env:
          DJANGO_NINJA_ADMIN_DIST_DIR: dist
          DJANGO_NINJA_ADMIN_DIST_UV_CACHE: /tmp/django-ninja-admin-uv-cache
        run: just dist-check

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: django-ninja-admin-wheel
          path: dist/*.whl
          if-no-files-found: error

  checks:
    name: Django ${{ matrix.django-label }} / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: dist
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - django-label: "5.0"
            django: ">=5.0,<5.1"
            python-version: "3.12"
            experimental: false
          - django-label: "5.1"
            django: ">=5.1,<5.2"
            python-version: "3.12"
            experimental: false
          - django-label: "5.2"
            django: ">=5.2,<5.3"
            python-version: "3.12"
            experimental: false
          - django-label: "5.2"
            django: ">=5.2,<5.3"
            python-version: "3.13"
            experimental: false
          - django-label: "6.0"
            django: ">=6.0,<6.1"
            python-version: "3.12"
            experimental: false
          - django-label: "6.0"
            django: ">=6.0,<6.1"
            python-version: "3.13"
            experimental: false
          - django-label: "6.0"
            django: ">=6.0,<6.1"
            python-version: "3.14"
            experimental: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: django-ninja-admin-wheel
          path: dist

      - name: Select Django version
        run: uv pip install "django${{ matrix.django }}"

      - name: Lint
        run: just lint

      - name: Format check
        run: just format-check

      - name: Type check
        run: just typecheck

      - name: Test
        run: just coverage-test

      - name: Package smoke
        env:
          DJANGO_NINJA_ADMIN_WHEEL: dist
        run: just package-smoke

      - name: Sample project smoke
        env:
          DJANGO_NINJA_ADMIN_WHEEL: dist
          DJANGO_NINJA_ADMIN_SMOKE_DJANGO: django${{ matrix.django }}
        run: just sample-project-smoke

      - name: Generated client smoke
        env:
          DJANGO_NINJA_ADMIN_WHEEL: dist
        run: just generated-client-smoke

  postgres:
    name: PostgreSQL / Django 5.2 / Python 3.12
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: django_ninja_admin
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d django_ninja_admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_NINJA_ADMIN_TEST_DATABASE: postgres
      POSTGRES_DB: django_ninja_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: "5432"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Select Django and PostgreSQL driver
        run: uv pip install "django>=5.2,<5.3" "psycopg[binary]>=3.2"

      - name: Test PostgreSQL
        run: just postgres-test
